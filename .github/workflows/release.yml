name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: tstnt-linux-x86_64

          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact: tstnt-linux-aarch64

          - os: ubuntu-latest
            target: armv7-unknown-linux-gnueabihf
            artifact: tstnt-linux-armv7

          - os: ubuntu-latest
            target: arm-unknown-linux-gnueabihf
            artifact: tstnt-linux-armv6

          - os: ubuntu-latest
            target: i686-unknown-linux-gnu
            artifact: tstnt-linux-x86

          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: tstnt-macos-x86_64

          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: tstnt-macos-aarch64

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: tstnt-windows-x86_64.exe

          - os: windows-latest
            target: aarch64-pc-windows-msvc
            artifact: tstnt-windows-aarch64.exe

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compile tools (aarch64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Install cross-compile tools (armv7)
        if: matrix.target == 'armv7-unknown-linux-gnueabihf'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-linux-gnueabihf

      - name: Install cross-compile tools (armv6)
        if: matrix.target == 'arm-unknown-linux-gnueabihf'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-linux-gnueabihf

      - name: Install cross-compile tools (i686)
        if: matrix.target == 'i686-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-i686-linux-gnu

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
          CARGO_TARGET_ARMV7_UNKNOWN_LINUX_GNUEABIHF_LINKER: arm-linux-gnueabihf-gcc
          CARGO_TARGET_ARM_UNKNOWN_LINUX_GNUEABIHF_LINKER: arm-linux-gnueabihf-gcc
          CARGO_TARGET_I686_UNKNOWN_LINUX_GNU_LINKER: i686-linux-gnu-gcc

      - name: Rename binary (Unix)
        if: matrix.os != 'windows-latest'
        run: cp target/${{ matrix.target }}/release/tstnt ${{ matrix.artifact }}

      - name: Rename binary (Windows)
        if: matrix.os == 'windows-latest'
        run: cp target/${{ matrix.target }}/release/tstnt.exe ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4.6.2
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  build-android:
    name: Build Android ${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: aarch64-linux-android
            artifact: tstnt-android-aarch64
            clang: aarch64-linux-android21-clang

          - target: armv7-linux-androideabi
            artifact: tstnt-android-armv7
            clang: armv7a-linux-androideabi21-clang

          - target: i686-linux-android
            artifact: tstnt-android-x86
            clang: i686-linux-android21-clang

          - target: x86_64-linux-android
            artifact: tstnt-android-x86_64
            clang: x86_64-linux-android21-clang

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Android NDK
        uses: nttld/setup-ndk@v1.5.0
        id: setup-ndk
        with:
          ndk-version: r26d

      - name: Build for Android
        run: cargo build --release --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER: ${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android21-clang
          CARGO_TARGET_ARMV7_LINUX_ANDROIDEABI_LINKER: ${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/armv7a-linux-androideabi21-clang
          CARGO_TARGET_I686_LINUX_ANDROID_LINKER: ${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/i686-linux-android21-clang
          CARGO_TARGET_X86_64_LINUX_ANDROID_LINKER: ${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/x86_64-linux-android21-clang

      - name: Rename binary
        run: cp target/${{ matrix.target }}/release/tstnt ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4.6.2
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    name: Create Release
    needs: [build, build-android]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Download all artifacts
        uses: actions/download-artifact@v4.3.0
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2.3.2
        with:
          files: artifacts/*
          body: |
            ## TSTNT ${{ github.ref_name }}

            ### Install

            **Android / Linux / macOS**
            ```bash
            curl -fsSL https://tstnt.lol/install.sh | sh
            ```

            **Windows (PowerShell)**
            ```powershell
            irm https://tstnt.lol/install.ps1 | iex
            ```

            ### Platforms
            | Platform | Architectures |
            |----------|---------------|
            | Android  | aarch64, armv7, x86, x86_64 |
            | Linux    | x86_64, aarch64, armv7, armv6, x86 |
            | macOS    | x86_64, aarch64 (Apple Silicon) |
            | Windows  | x86_64, aarch64 |

            ### Build from source
            ```bash
            git clone https://github.com/tstnt-lang/tstnt
            cd tstnt && cargo build --release
            ```

            ### Changelog
            See [commits](https://github.com/tstnt-lang/tstnt/commits/${{ github.ref_name }})
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
