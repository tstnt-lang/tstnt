name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: tstnt-linux-x86_64

          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact: tstnt-linux-aarch64

          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: tstnt-macos-x86_64

          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: tstnt-macos-aarch64

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: tstnt-windows-x86_64.exe

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compile tools (Linux aarch64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      - name: Rename binary (Unix)
        if: matrix.os != 'windows-latest'
        run: cp target/${{ matrix.target }}/release/tstnt ${{ matrix.artifact }}

      - name: Rename binary (Windows)
        if: matrix.os == 'windows-latest'
        run: cp target/${{ matrix.target }}/release/tstnt.exe ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Build Android binary info
        run: |
          echo "Android binary must be cross-compiled separately"
          echo "See README for Android/Termux build instructions"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          body: |
            ## TSTNT ${{ github.ref_name }}

            ### Install

            **Android / Linux / macOS**
            ```bash
            curl -fsSL https://tstnt-lang.github.io/install.sh | sh
            ```

            **Windows (PowerShell)**
            ```powershell
            irm https://tstnt-lang.github.io/install.ps1 | iex
            ```

            ### Build from source
            ```bash
            git clone https://github.com/tstnt-lang/tstnt
            cd tstnt && cargo build --release
            ```

            ### Changelog
            See [commits](https://github.com/tstnt-lang/tstnt/commits/${{ github.ref_name }})
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-android:
    name: Build Android (aarch64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Install Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r26d

      - name: Build for Android
        run: cargo build --release --target aarch64-linux-android
        env:
          CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER: ${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android21-clang

      - name: Rename binary
        run: cp target/aarch64-linux-android/release/tstnt tstnt-android-aarch64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: tstnt-android-aarch64
          path: tstnt-android-aarch64
